<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الدورات - علوم الأغذية والتقانات الأحيائية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .main-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .admin-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .admin-btn:hover {
            background: white;
            color: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
        
        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 3px solid #1e3c72;
            display: none;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }
        
        .results-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .alert-card {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4cc 100%);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255, 154, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .yesterday-card {
            background: linear-gradient(135deg, #f0f4f8 0%, #e6ecf5 100%);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.2);
            margin-bottom: 20px;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
        }
        
        .btn-print-custom {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-print-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.4);
        }
        
        .participant-row {
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }
        
        .participant-row:nth-child(even) {
            background: #f8f9fa;
        }
        
        .participant-row:hover {
            background: #e9ecef;
            transform: translateX(-5px);
        }
        
        .result-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px;
        }
        
        .alert-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border-right: 5px solid #ff9a3c;
            transition: all 0.3s;
        }
        
        .alert-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 154, 60, 0.3);
        }
        
        .yesterday-item {
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-right: 5px solid #6c757d;
            transition: all 0.3s;
        }
        
        .yesterday-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }
        
        .alert-icon {
            width: 40px;
            height: 40px;
            background: #ff9a3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .yesterday-icon {
            width: 35px;
            height: 35px;
            background: #6c757d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .course-badge {
            background: rgba(30, 60, 114, 0.1);
            color: #1e3c72;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }
        
        .location-badge {
            background: rgba(52, 152, 219, 0.1);
            color: #2980b9;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }
        
        .duration-badge {
            background: rgba(142, 68, 173, 0.1);
            color: #8e44ad;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #6c757d;
        }
        
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1e3c72;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .images-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        
        .image-item {
            width: 50px;
            height: 50px;
            border: 2px solid #1e3c72;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .image-item:hover {
            transform: scale(1.1);
            border-color: #ff9a3c;
            z-index: 10;
        }
        
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .no-image-box {
            width: 50px;
            height: 50px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #999;
            font-size: 10px;
            text-align: center;
        }
        
        .participant-name {
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        .date-display {
            font-family: monospace;
            background: #f8f9fa;
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            display: inline-block;
        }
        
        .stats-number {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
        }
        
        .column-header {
            font-weight: bold;
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 2px solid #1e3c72;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-right: 5px solid #dc3545;
        }
        
        .admin-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .save-btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .save-btn:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
        }
        
        .password-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #1e3c72;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .admin-table {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 10px;
        }
        
        .date-example {
            font-size: 12px;
            color: #6c757d;
            margin-top: 2px;
        }
        
        #currentDateDisplay, #currentTimeDisplay {
            font-size: 1.1rem;
        }

        /* تنسيقات الكاميرا والاستوديو */
        .camera-btn {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            margin-top: 0px;
            margin-bottom: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: auto;
        }
        .camera-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .gallery-btn {
            background: linear-gradient(135deg, #6c5ce7 0%, #a363d9 100%);
        }
        .gallery-btn:hover {
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }
        .camera-preview {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            z-index: 2000;
            display: none;
            max-width: 90%;
            max-height: 90%;
        }
        .camera-preview video, .camera-preview canvas {
            max-width: 100%;
            border-radius: 10px;
        }
        .image-field-container {
            position: relative;
            margin-bottom: 5px;
        }
        .button-group {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .button-group .camera-btn {
            flex: 1;
            margin-bottom: 0;
        }
        
        /* نافذة عرض الصورة المكبرة */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .close-image-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .download-image-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            background: #28a745;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* تذييل الصفحة */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        footer div:first-child {
            color: #1e3c72;
            font-size: 18px;
            font-weight: bold;
        }
        footer i.bi-heart-fill {
            color: #ff6b6b;
            margin: 0 5px;
        }
        footer div:last-child {
            color: #6c757d;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h4 class="mb-3"><i class="bi bi-lock"></i> دخول لوحة الإدارة</h4>
            <input type="password" id="adminPassword" class="password-input" placeholder="أدخل كلمة المرور">
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary-custom" onclick="checkPassword()">دخول</button>
                <button class="btn btn-secondary" onclick="closePasswordModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة الكاميرا المنبثقة -->
    <div id="cameraModal" class="camera-preview">
        <h5 class="mb-3"><i class="bi bi-camera"></i> التقاط صورة</h5>
        <video id="cameraVideo" autoplay playsinline style="width:100%; max-height:400px;"></video>
        <canvas id="cameraCanvas" style="display: none;"></canvas>
        <div class="d-flex gap-2 mt-3 justify-content-center">
            <button class="btn btn-success" onclick="captureImage()">
                <i class="bi bi-camera"></i> التقاط صورة
            </button>
            <button class="btn btn-danger" onclick="closeCamera()">
                <i class="bi bi-x-lg"></i> إغلاق
            </button>
        </div>
    </div>

    <!-- نافذة عرض الصورة المكبرة -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <div class="close-image-btn" onclick="closeImageModal()">✕</div>
        <div class="download-image-btn" onclick="downloadImage()">
            <i class="bi bi-download"></i> تحميل الصورة
        </div>
        <img id="modalImage" src="" alt="صورة مكبرة">
    </div>

    <!-- نافذة تعديل المرشح -->
    <div id="editModal" class="modal" style="display: none; overflow-y: auto;">
        <div class="modal-content" style="max-width: 800px; max-height: 90vh; overflow-y: auto;">
            <h4 class="mb-3"><i class="bi bi-pencil"></i> تعديل بيانات المرشح</h4>
            <input type="hidden" id="editRowIndex">
            
            <div class="row">
                <div class="col-md-6">
                    <label>اسم المشارك</label>
                    <input type="text" id="editName" class="admin-input">
                </div>
                <div class="col-md-6">
                    <label>الدورة</label>
                    <input type="text" id="editCourse" class="admin-input">
                </div>
                <div class="col-md-6">
                    <label>تاريخ الدورة</label>
                    <input type="text" id="editDate" class="admin-input" placeholder="مثال: 2026/02/17">
                </div>
                <div class="col-md-6">
                    <label>مكان الدورة</label>
                    <input type="text" id="editLocation" class="admin-input">
                </div>
                <div class="col-md-6">
                    <label>المدة</label>
                    <input type="text" id="editDuration" class="admin-input">
                </div>
                
                <!-- صورة 1 -->
                <div class="col-md-4">
                    <label>صورة 1</label>
                    <div class="image-field-container">
                        <input type="text" id="editImage1" class="admin-input" placeholder="رابط صورة 1">
                        <div class="button-group">
                            <button class="camera-btn" onclick="openEditCamera(1)" type="button">
                                <i class="bi bi-camera"></i> 📷
                            </button>
                            <button class="camera-btn gallery-btn" onclick="openEditGallery(1)" type="button">
                                <i class="bi bi-images"></i> 📁
                            </button>
                        </div>
                    </div>
                    <div id="previewImage1" style="margin-top: 5px;"></div>
                </div>
                
                <!-- صورة 2 -->
                <div class="col-md-4">
                    <label>صورة 2</label>
                    <div class="image-field-container">
                        <input type="text" id="editImage2" class="admin-input" placeholder="رابط صورة 2">
                        <div class="button-group">
                            <button class="camera-btn" onclick="openEditCamera(2)" type="button">
                                <i class="bi bi-camera"></i> 📷
                            </button>
                            <button class="camera-btn gallery-btn" onclick="openEditGallery(2)" type="button">
                                <i class="bi bi-images"></i> 📁
                            </button>
                        </div>
                    </div>
                    <div id="previewImage2" style="margin-top: 5px;"></div>
                </div>
                
                <!-- صور
